name: Build PokeVoid Windows EXE

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (leave blank to use this workflow run number)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Configure Git line endings
        run: git config --global core.autocrlf false

      - name: Clone PokeVoid fork
        run: git clone --recurse-submodules --depth 1 --branch main https://github.com/smittynugget/pokevoid.git pokevoid-src

      - name: Apply patches
        shell: bash
        run: bash scripts/apply-patches.sh

      - name: Remove CapacitorUpdater import from main.ts
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const path = 'pokevoid-src/src/main.ts';
            let content = fs.readFileSync(path, 'utf8');
            content = content.replace(
              /(void boot\(\);)[\s\S]*?(export default game;)/,
              '\$1\n\n\$2'
            );
            fs.writeFileSync(path, content);
          "

      - name: Install PokeVoid dependencies
        working-directory: pokevoid-src
        run: pnpm install

      - name: Install Electron dependencies
        working-directory: pokevoid-src
        run: pnpm add -D electron electron-builder

      - name: Convert app icon to ICO
        shell: pwsh
        run: |
          magick ${{ github.workspace }}\appIcon.png `
            -define icon:auto-resize=256,128,64,48,32,16 `
            ${{ github.workspace }}\appIcon.ico
          Write-Host "ICO created at ${{ github.workspace }}\appIcon.ico"

      - name: Build PokeVoid
        working-directory: pokevoid-src
        env:
          VITE_BYPASS_LOGIN: '1'
        run: pnpm build --mode app

      - name: Apply post-build patches
        shell: bash
        run: bash scripts/apply-post-build-patches.sh

      - name: Copy Electron config files into place
        shell: bash
        run: |
          cp configs/desktop/electron/main.cjs pokevoid-src/main.cjs
          cp configs/desktop/electron/electron-builder.windows.json pokevoid-src/electron-builder.json
          cp appIcon.ico pokevoid-src/appIcon.ico

      - name: Set electron main in package.json
        working-directory: pokevoid-src
        shell: bash
        run: |
          node -e "
            const pkg = require('./package.json');
            if (!pkg.description) pkg.description = 'PokeVoid Offline';
            if (!pkg.author) pkg.author = 'Scooom';
            pkg.main = 'main.cjs';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Generate Windows EXE
        working-directory: pokevoid-src
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ''
          WIN_CSC_LINK: ''
        run: pnpm electron-builder --win portable --config electron-builder.json

      - name: Rename and save EXE
        id: exe_path
        shell: bash
        run: |
          FILE=$(find -type f -name "PokeVoid*Offline*.exe" | head -n1)
          OUTPUT="./PokeVoidOffline.exe"
          mv "$FILE" "$OUTPUT"
          echo "exe=$OUTPUT" >> $GITHUB_OUTPUT

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokeVoidOffline-Windows
          path: ${{ steps.exe_path.outputs.exe }}
          retention-days: 30
