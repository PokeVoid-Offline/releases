name: Build PokeVoid IPA & APK

on:
  workflow_dispatch:
    inputs:
      build_desktop:
        description: 'Build desktop apps (Windows, macOS, Linux)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  # Prepare step - clone repo, apply patches, build once

  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pokevoid_version.outputs.version }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Clone PokeVoid fork
        run: git clone --recurse-submodules --depth 1 --branch main https://github.com/smittynugget/pokevoid.git pokevoid-src

      - name: Get PokeVoid version
        id: pokevoid_version
        run: |
          VERSION=2.4.3
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Apply patches
        run: bash ${{ github.workspace }}/scripts/apply-patches.sh

      - name: Remove CapacitorUpdater import from main.ts
        run: |
          node -e "
            const fs = require('fs');
            const path = 'pokevoid-src/src/main.ts';
            let content = fs.readFileSync(path, 'utf8');
            content = content.replace(
              /(void boot\(\);)[\s\S]*?(export default game;)/,
              '\$1\n\n\$2'
            );
            fs.writeFileSync(path, content);
          "

      - name: Install PokeVoid dependencies
        working-directory: pokevoid-src
        run: pnpm install

      - name: Build PokeVoid
        working-directory: pokevoid-src
        env:
          VITE_BYPASS_LOGIN: '1'
        run: pnpm build

      - name: Apply post-build patches
        run: bash ${{ github.workspace }}/scripts/apply-post-build-patches.sh

      - name: Upload built source
        uses: actions/upload-artifact@v4
        with:
          name: pokevoid-built
          path: pokevoid-src/
          retention-days: 1

  # Build iOS IPA
  build-ios:
    needs: prepare
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Download built source
        uses: actions/download-artifact@v4
        with:
          name: pokevoid-built
          path: pokevoid-src

      - name: Install Capacitor
        working-directory: pokevoid-src
        run: |
          pnpm add @capacitor/core @capacitor/cli @capacitor/ios @capacitor/filesystem @capacitor/share @capacitor/status-bar @capacitor/browser

      - name: Configure Capacitor
        working-directory: pokevoid-src
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "xyz.scooom.pv",
            "appName": "PokeVoid Offline",
            "webDir": "dist",
            "ios": {
              "scrollEnabled": false,
              "backgroundColor": "#000000",
              "allowsLinkPreview": false,
              "allowsBackForwardNavigationGestures": false
            },
            "plugins": {
              "StatusBar": {
                "overlaysWebView": false,
                "style": "DARK",
                "backgroundColor": "#000000"
              }
            }
          }
          CAPEOF

      - name: Add iOS platform
        working-directory: pokevoid-src
        run: npx cap add ios

      - name: Sync Capacitor
        working-directory: pokevoid-src
        run: npx cap sync ios

      - name: Set app version
        working-directory: pokevoid-src
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ needs.prepare.outputs.version }}.${{ github.run_number }}" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ needs.prepare.outputs.version }}.${{ github.run_number }}" ios/App/App/Info.plist

      - name: Configure iOS app settings
        working-directory: pokevoid-src
        run: |
          /usr/libexec/PlistBuddy -c "Add :UIStatusBarHidden bool true" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIViewControllerBasedStatusBarAppearance bool false" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :LSApplicationCategoryType public.app-category.games" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :LSApplicationCategoryType string public.app-category.games" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIHomeIndicatorAutoHidden bool true" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSDocumentsFolderUsageDescription string 'Required to save your exported game data file.'" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" ios/App/App/Info.plist || true

      - name: Register .prsv UTI so iOS preserves the file extension
        working-directory: pokevoid-src
        run: |
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes array" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0 dict" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:CFBundleTypeName string PokeVoid Save Data" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:LSItemContentTypes array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:LSItemContentTypes:0 string xyz.scooom.pv.prsv" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:LSHandlerRank string Owner" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations array" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0 dict" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeIdentifier string xyz.scooom.pv.prsv" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeDescription string PokeVoid Save Data" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeConformsTo array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeConformsTo:0 string public.data" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification dict" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification:public.filename-extension array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification:public.filename-extension:0 string prsv" ios/App/App/Info.plist

      - name: Copy app icon
        run: |
          cp appIcon.png pokevoid-src/ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png

      - name: Build Xcode project (unsigned)
        run: |
          xcodebuild \
            -project pokevoid-src/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=$PWD/build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r "build/App.app" Payload/
          zip -r PokeVoidOffline.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokeVoidOffline-IPA
          path: PokeVoidOffline.ipa
          retention-days: 30

  # Build Android APK
  build-android:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Download built source
        uses: actions/download-artifact@v4
        with:
          name: pokevoid-built
          path: pokevoid-src

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        working-directory: pokevoid-src
        run: |
          pnpm add @capacitor/core @capacitor/cli @capacitor/android @capacitor/filesystem @capacitor/share @capacitor/browser 

      - name: Configure Capacitor
        working-directory: pokevoid-src
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "xyz.scooom.pv",
            "appName": "PokeVoid Offline",
            "webDir": "dist",
            "android": {
              "allowMixedContent": true,
              "backgroundColor": "#000000",
              "orientation": "landscape"
            }
          }
          CAPEOF

      - name: Add Android platform
        working-directory: pokevoid-src
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: pokevoid-src
        run: npx cap sync android

      - name: Fix Android package ID and permissions
        working-directory: pokevoid-src
        run: |
          # ---- Package ID ----
          # cap add android uses the appId from capacitor.config.json as the
          # applicationId in build.gradle, but the Java source directory and
          # namespace still use the template default (com.getcapacitor.myapp).
          # We need to rename the source directory and update all references.
          OLD_PKG_PATH=$(find android/app/src/main/java -name "MainActivity.java" | head -1 | xargs dirname)
          NEW_PKG_PATH="android/app/src/main/java/xyz/scooom/pv"
          mkdir -p "$NEW_PKG_PATH"
          cp "$OLD_PKG_PATH/MainActivity.java" "$NEW_PKG_PATH/MainActivity.java"
          rm -rf android/app/src/main/java/com
 
          # Update package declaration in MainActivity.java
          sed -i 's/^package .*/package xyz.scooom.pv;/' "$NEW_PKG_PATH/MainActivity.java"
 
          # Update namespace in build.gradle
          sed -i 's/namespace = "[^"]*"/namespace = "xyz.scooom.pv"/' android/app/build.gradle
          sed -i 's/applicationId "[^"]*"/applicationId "xyz.scooom.pv"/' android/app/build.gradle

          # ---- Permissions ----
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          grep -q "WRITE_EXTERNAL_STORAGE" $MANIFEST || \
            sed -i 's|<application|<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <application|' $MANIFEST
          echo "Contents of ${MANIFEST}"
          cat $MANIFEST

      - name: Set app version
        working-directory: pokevoid-src
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="${{ needs.prepare.outputs.version }}.${{ github.run_number }}"
          sed -i "s/versionCode 1/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle

      - name: Copy app icon
        run: |
          sudo apt-get update -q
          sudo apt-get install -y imagemagick

          # Generate all required icon sizes
          # mdpi=48, hdpi=72, xhdpi=96, xxhdpi=144, xxxhdpi=192
          for density in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            dir="${density%%:*}"
            size="${density##*:}"
            mkdir -p pokevoid-src/android/app/src/main/res/mipmap-${dir}

            # ic_launcher: plain square icon (legacy fallback)
            convert appIconAndroid.png -resize ${size}x${size}               pokevoid-src/android/app/src/main/res/mipmap-${dir}/ic_launcher.png

            # ic_launcher_round: round variant — add ~18% padding on each side
            # so the artwork is not clipped by the circular mask on round launchers.
            # The padded icon sits within the "safe zone" of the circle.
            padded_size=$((size * 100 / 82))
            convert appIconAndroid.png               -resize ${size}x${size}               -gravity center               -background "#1a0030"               -extent ${padded_size}x${padded_size}               pokevoid-src/android/app/src/main/res/mipmap-${dir}/ic_launcher_round.png

            # ic_launcher_foreground: used by adaptive icons (Android 8+)
            # Must be 108dp canvas with artwork in the inner 72dp safe zone (~66%).
            # We place the icon at 66% of the canvas size, centered on a dark bg.
            fgsize=$((size * 108 / 48))
            artsize=$((size * 72 / 48))
            convert appIconAndroid.png               -resize ${artsize}x${artsize}               -gravity center               -background "#1a0030"               -extent ${fgsize}x${fgsize}               pokevoid-src/android/app/src/main/res/mipmap-${dir}/ic_launcher_foreground.png
          done

          # Delete the adaptive icon XML directory so Android 8+ uses the
          # plain PNGs instead of the default Capacitor adaptive icon which
          # would otherwise override everything above.
          rm -rf pokevoid-src/android/app/src/main/res/mipmap-anydpi-v26

      - name: Make Gradle wrapper executable
        run: chmod +x pokevoid-src/android/gradlew

      - name: Build debug APK
        working-directory: pokevoid-src/android
        run: ./gradlew assembleDebug

      - name: Copy APK
        run: cp pokevoid-src/android/app/build/outputs/apk/debug/app-debug.apk PokeVoidOffline.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokeVoidOffline-APK
          path: PokeVoidOffline.apk
          retention-days: 30

  # Build Desktop apps
  build-desktop:
    if: inputs.build_desktop == 'true'
    needs: prepare
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: PokeVoidOffline-Windows
            output: PokeVoidOffline-Windows.exe
          - os: macos-latest
            platform: mac
            artifact: PokeVoidOffline-Mac
            output: PokeVoidOffline-Mac.dmg
          - os: macos-latest
            platform: mac
            artifact: PokeVoidOffline-Mac-arm64
            output: PokeVoidOffline-Mac-arm64.dmg
          - os: ubuntu-latest
            platform: linux
            artifact: PokeVoidOffline-Linux
            output: PokeVoidOffline-Linux.AppImage
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Download built source
        uses: actions/download-artifact@v4
        with:
          name: pokevoid-built
          path: pokevoid-src

      - name: Install ImageMagick (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Install ImageMagick (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install imagemagick

      - name: Install ImageMagick (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install imagemagick -y

      - name: Convert icon for Windows (.ico)
        if: matrix.os == 'windows-latest'
        run: magick appIcon.png -resize 256x256 appIcon.ico

      - name: Convert icon for macOS (.icns)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p AppIcon.iconset
          convert appIcon.png -resize 16x16     AppIcon.iconset/icon_16x16.png
          convert appIcon.png -resize 32x32     AppIcon.iconset/icon_16x16@2x.png
          convert appIcon.png -resize 32x32     AppIcon.iconset/icon_32x32.png
          convert appIcon.png -resize 64x64     AppIcon.iconset/icon_32x32@2x.png
          convert appIcon.png -resize 128x128   AppIcon.iconset/icon_128x128.png
          convert appIcon.png -resize 256x256   AppIcon.iconset/icon_128x128@2x.png
          convert appIcon.png -resize 256x256   AppIcon.iconset/icon_256x256.png
          convert appIcon.png -resize 512x512   AppIcon.iconset/icon_256x256@2x.png
          convert appIcon.png -resize 512x512   AppIcon.iconset/icon_512x512.png
          convert appIcon.png -resize 1024x1024 AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset -o appIcon.icns

      - name: Write Electron main.js
        shell: bash
        run: |
          cat > pokevoid-src/electron-main.js << 'EOF'
          const { app, BrowserWindow } = require('electron');
          const path = require('path');

          function createWindow() {
            const win = new BrowserWindow({
              width: 1280,
              height: 720,
              fullscreen: true,
              webPreferences: {
                nodeIntegration: false,
                contextIsolation: true,
              },
            });

            win.loadFile(path.join(__dirname, 'dist', 'index.html'));
            win.setMenuBarVisibility(false);
          }

          app.whenReady().then(createWindow);

          app.on('window-all-closed', () => {
            if (process.platform !== 'darwin') app.quit();
          });

          app.on('activate', () => {
            if (BrowserWindow.getAllWindows().length === 0) createWindow();
          });
          EOF

      - name: Write electron-builder config
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}.${{ github.run_number }}"
          cat > pokevoid-src/electron-builder.json << EOF
          {
            "appId": "xyz.scooom.pv",
            "productName": "PokeVoid Offline",
            "copyright": "PokeVoid by smittynugget",
            "directories": {
              "output": "electron-dist"
            },
            "files": [
              "dist/**",
              "electron-main.js"
            ],
            "extraMetadata": {
              "main": "electron-main.js",
              "version": "${VERSION}"
            },
            "win": {
              "target": [{ "target": "portable", "arch": ["x64"] }],
              "icon": "../appIcon.ico"
            },
            "mac": {
              "target": [{ "target": "dmg", "arch": ["x64", "arm64"] }],
              "icon": "../appIcon.icns",
              "category": "public.app-category.games"
            },
            "linux": {
              "target": [{ "target": "AppImage", "arch": ["x64"] }],
              "icon": "../appIcon.png",
              "category": "Game"
            }
          }
          EOF

      - name: Install Electron and electron-builder
        working-directory: pokevoid-src
        run: pnpm add -D electron electron-builder

      - name: Build desktop app (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: pokevoid-src
        run: npx electron-builder --win --config electron-builder.json

      - name: Build desktop app (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: pokevoid-src
        run: npx electron-builder --mac --config electron-builder.json

      - name: Build desktop app (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: pokevoid-src
        run: npx electron-builder --linux --config electron-builder.json

      - name: Copy output (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: cp pokevoid-src/electron-dist/*.exe PokeVoidOffline-Windows.exe

      - name: Copy output (macOS x64)
        if: matrix.artifact == 'PokeVoidOffline-Mac'
        run: |
          cp pokevoid-src/electron-dist/*.${{ github.run_number }}.dmg PokeVoidOffline-Mac.dmg

      - name: Copy output (macOS arm64)
        if: matrix.artifact == 'PokeVoidOffline-Mac-arm64'
        run: |
          cp pokevoid-src/electron-dist/*-arm64.dmg PokeVoidOffline-Mac-arm64.dmg

      - name: Copy output (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cp pokevoid-src/electron-dist/*.AppImage PokeVoidOffline-Linux.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.output }}
          retention-days: 30

  # Create release with all builds
  release:
    needs: [prepare, build-ios, build-android, build-desktop]
    if: always() && needs.prepare.result == 'success' && needs.build-ios.result == 'success' && needs.build-android.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: PokeVoidOffline-IPA
          path: ./

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: PokeVoidOffline-APK
          path: ./

      - name: Download Windows build
        if: inputs.build_desktop == 'true'
        uses: actions/download-artifact@v4
        with:
          name: PokeVoidOffline-Windows
          path: ./

      - name: Download macOS build x64
        if: inputs.build_desktop == 'true'
        uses: actions/download-artifact@v4
        with:
          name: PokeVoidOffline-Mac
          path: ./

      - name: Download macOS build arm64
        if: inputs.build_desktop == 'true'
        uses: actions/download-artifact@v4
        with:
          name: PokeVoidOffline-Mac-arm64
          path: ./

      - name: Download Linux build
        if: inputs.build_desktop == 'true'
        uses: actions/download-artifact@v4
        with:
          name: PokeVoidOffline-Linux
          path: ./

      - name: Get file sizes
        id: file_sizes
        run: |
          IPA_SIZE=$(wc -c < PokeVoidOffline.ipa | numfmt --to=iec-i --suffix=B)
          APK_SIZE=$(wc -c < PokeVoidOffline.apk | numfmt --to=iec-i --suffix=B)
          echo "ipa_size=$IPA_SIZE" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          if [ "${{ inputs.build_desktop }}" = "true" ]; then
            WIN_SIZE=$(wc -c < PokeVoidOffline-Windows.exe | numfmt --to=iec-i --suffix=B)
            MAC_SIZE=$(wc -c < PokeVoidOffline-Mac.dmg | numfmt --to=iec-i --suffix=B)
            MAC_ARM64_SIZE=$(wc -c < PokeVoidOffline-Mac-arm64.dmg | numfmt --to=iec-i --suffix=B)
            LIN_SIZE=$(wc -c < PokeVoidOffline-Linux.AppImage | numfmt --to=iec-i --suffix=B)
            echo "win_size=$WIN_SIZE" >> $GITHUB_OUTPUT
            echo "mac_size=$MAC_SIZE" >> $GITHUB_OUTPUT
            echo "mac_arm64_size=$MAC_ARM64_SIZE" >> $GITHUB_OUTPUT
            echo "lin_size=$LIN_SIZE" >> $GITHUB_OUTPUT
          fi

      - name: Create Release (mobile only)
        if: inputs.build_desktop != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}-${{ github.run_number }}
          name: PokeVoid Offline v${{ needs.prepare.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## PokeVoid Offline - Mobile Release

            ### 📦 Downloads
            - **iOS (IPA)**: `PokeVoidOffline.ipa` (${{ steps.file_sizes.outputs.ipa_size }})
            - **Android (APK)**: `PokeVoidOffline.apk` (${{ steps.file_sizes.outputs.apk_size }})

            ### 📱 Installation

            #### iOS
            - Use SideStore, LiveContainer, or your preferred sideloading method
            - See [installation guide](https://github.com/PokeVoid-Offline/releases#installing-the-ipa)

            #### Android
            - Enable "Install from Unknown Sources" in Settings
            - Download and install the APK
            - Note: APK is debug-signed, you may need to allow installation

            ### ℹ️ Info
            - **Version**: ${{ needs.prepare.outputs.version }}
            - **Build**: ${{ github.run_number }}
            - **Based on**: [PokeVoid by smittynugget](https://github.com/smittynugget/pokevoid)

            ### ⚠️ Notes
            - Mobile builds are **unsigned/debug-signed** - for personal use only
            - Fully offline - no internet required after installation
            - Save files are stored locally on device
          files: |
            PokeVoidOffline.ipa
            PokeVoidOffline.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (all platforms)
        if: inputs.build_desktop == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}-${{ github.run_number }}
          name: PokeVoid Offline v${{ needs.prepare.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## PokeVoid Offline - Multi-Platform Release

            ### 📦 Downloads
            - **iOS (IPA)**: `PokeVoidOffline.ipa` (${{ steps.file_sizes.outputs.ipa_size }})
            - **Android (APK)**: `PokeVoidOffline.apk` (${{ steps.file_sizes.outputs.apk_size }})
            - **Windows**: `PokeVoidOffline-Windows.exe` (${{ steps.file_sizes.outputs.win_size }})
            - **macOS**: `PokeVoidOffline-Mac.dmg` (${{ steps.file_sizes.outputs.mac_size }})
            - **macOS arm64**: `PokeVoidOffline-Mac-arm64.dmg` (${{ steps.file_sizes.outputs.mac_arm64_size }})
            - **Linux**: `PokeVoidOffline-Linux.AppImage` (${{ steps.file_sizes.outputs.lin_size }})

            ### 📱 Installation

            #### iOS
            - Use SideStore, LiveContainer, or your preferred sideloading method
            - See [installation guide](https://github.com/PokeVoid-Offline/releases#installing-the-ipa)

            #### Android
            - Enable "Install from Unknown Sources" in Settings
            - Download and install the APK
            - Note: APK is debug-signed, you may need to allow installation

            #### Windows
            - Download and run the `.exe` — no installation needed

            #### macOS
            - Download the `.dmg`, open it, and drag PokeVoid Offline to your Applications folder
            - You may need to allow the app in System Settings → Privacy & Security

            #### Linux
            - Download the `.AppImage`, make it executable (`chmod +x`), and run it

            ### ℹ️ Info
            - **Version**: ${{ needs.prepare.outputs.version }}
            - **Build**: ${{ github.run_number }}
            - **Based on**: [PokeVoid by smittynugget](https://github.com/smittynugget/pokevoid)

            ### ⚠️ Notes
            - Mobile builds are **unsigned/debug-signed** - for personal use only
            - Desktop builds are **unsigned** - you may need to bypass OS security warnings
            - Fully offline - no internet required after installation
            - Save files are stored locally on device
          files: |
            PokeVoidOffline.ipa
            PokeVoidOffline.apk
            PokeVoidOffline-Windows.exe
            PokeVoidOffline-Mac.dmg
            PokeVoidOffline-Mac-arm64.dmg
            PokeVoidOffline-Linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}