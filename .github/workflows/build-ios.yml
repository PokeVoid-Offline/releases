name: Build PokeVoid IPA

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (leave blank to use this workflow run number)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Clone PokeVoid fork
        run: git clone --recurse-submodules --depth 1 --branch main https://github.com/smittynugget/pokevoid.git pokevoid-src

      - name: Get PokeVoid version
        id: pokevoid_version
        run: |
          VERSION=2.4.3
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Apply patches
        run: bash ${{ github.workspace }}/scripts/apply-patches.sh

      - name: Remove CapacitorUpdater import from main.ts
        run: |
          node -e "
            const fs = require('fs');
            const path = 'pokevoid-src/src/main.ts';
            let content = fs.readFileSync(path, 'utf8');
            content = content.replace(
              /(void boot\(\);)[\s\S]*?(export default game;)/,
              '\$1\n\n\$2'
            );
            fs.writeFileSync(path, content);
          "

      - name: Install PokeVoid dependencies
        working-directory: pokevoid-src
        run: pnpm install

      - name: Build PokeVoid
        working-directory: pokevoid-src
        env:
          VITE_BYPASS_LOGIN: '1'
        run: pnpm build --mode app

      - name: Apply post-build patches
        run: bash ${{ github.workspace }}/scripts/apply-post-build-patches.sh

      - name: Install Capacitor
        working-directory: pokevoid-src
        run: |
          pnpm add @capacitor/core @capacitor/cli @capacitor/ios @capacitor/filesystem @capacitor/share @capacitor/status-bar @capacitor/browser

      - name: Configure Capacitor
        working-directory: pokevoid-src
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "xyz.scooom.pv",
            "appName": "PokeVoid Offline",
            "webDir": "dist",
            "ios": {
              "scrollEnabled": false,
              "backgroundColor": "#000000",
              "allowsLinkPreview": false,
              "allowsBackForwardNavigationGestures": false
            },
            "plugins": {
              "StatusBar": {
                "overlaysWebView": false,
                "style": "DARK",
                "backgroundColor": "#000000"
              }
            }
          }
          CAPEOF

      - name: Add iOS platform
        working-directory: pokevoid-src
        run: npx cap add ios

      - name: Sync Capacitor
        working-directory: pokevoid-src
        run: npx cap sync ios

      - name: Set app version
        working-directory: pokevoid-src
        run: |
          BUILD_NUM=${{ inputs.build_number || github.run_number }}
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.pokevoid_version.outputs.version }}.${BUILD_NUM}" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.pokevoid_version.outputs.version }}.${BUILD_NUM}" ios/App/App/Info.plist

      - name: Configure iOS app settings
        working-directory: pokevoid-src
        run: |
          /usr/libexec/PlistBuddy -c "Add :UIStatusBarHidden bool true" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIViewControllerBasedStatusBarAppearance bool false" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :LSApplicationCategoryType public.app-category.games" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :LSApplicationCategoryType string public.app-category.games" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIHomeIndicatorAutoHidden bool true" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSDocumentsFolderUsageDescription string 'Required to save your exported game data file.'" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" ios/App/App/Info.plist || true

      - name: Register .prsv UTI so iOS preserves the file extension
        working-directory: pokevoid-src
        run: |
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes array" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0 dict" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:CFBundleTypeName string PokeVoid Save Data" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:LSItemContentTypes array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:LSItemContentTypes:0 string xyz.scooom.pv.prsv" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:LSHandlerRank string Owner" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations array" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0 dict" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeIdentifier string xyz.scooom.pv.prsv" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeDescription string PokeVoid Save Data" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeConformsTo array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeConformsTo:0 string public.data" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification dict" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification:public.filename-extension array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification:public.filename-extension:0 string prsv" ios/App/App/Info.plist

      - name: Copy app icon
        run: |
          cp appIcon.png pokevoid-src/ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png

      - name: Build Xcode project (unsigned)
        run: |
          xcodebuild \
            -project pokevoid-src/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=$PWD/build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r "build/App.app" Payload/
          zip -r PokeVoidOffline.ipa Payload
          rm -rf Payload

      - name: Upload version artifact
        run: echo -n "${{ steps.pokevoid_version.outputs.version }}" > version.txt

      - name: Upload IPA and version artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PokeVoidOffline-IPA
          path: |
            PokeVoidOffline.ipa
            version.txt
          retention-days: 30
